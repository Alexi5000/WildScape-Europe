# WildScape Europe - Docker Compose Configuration
version: '3.8'

services:
  # Development service
  app-dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: wildscape-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    command: npm run dev -- --host 0.0.0.0
    networks:
      - wildscape-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Production service
  app-prod:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: wildscape-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    networks:
      - wildscape-network
    restart: unless-stopped
    profiles:
      - production

  # Optional: Redis for caching (if needed)
  redis:
    image: redis:7-alpine
    container_name: wildscape-redis
    ports:
      - "6379:6379"
    networks:
      - wildscape-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - cache

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: wildscape-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app-prod
    networks:
      - wildscape-network
    restart: unless-stopped
    profiles:
      - production

networks:
  wildscape-network:
    driver: bridge
    name: wildscape-network

volumes:
  redis-data:
    driver: local
    name: wildscape-redis-data

