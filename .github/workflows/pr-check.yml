name: PR Checks - Code Review Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop

# Cancel previous runs when new commits are pushed
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: PR Validation
  pr-validation:
    name: PR Validation & Auto-Label
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false

      - name: Check PR Size
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES_CHANGED=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= insertion)|\d+(?= deletion)' | awk '{s+=$1} END {print s}')
          
          echo "Files changed: $FILES_CHANGED"
          echo "Lines changed: $LINES_CHANGED"
          
          if [ "$FILES_CHANGED" -gt 50 ]; then
            echo "⚠️ Large PR: More than 50 files changed"
            echo "pr_size=large" >> $GITHUB_OUTPUT
          elif [ "$LINES_CHANGED" -gt 500 ]; then
            echo "⚠️ Large PR: More than 500 lines changed"
            echo "pr_size=large" >> $GITHUB_OUTPUT
          else
            echo "✅ PR size is reasonable"
            echo "pr_size=small" >> $GITHUB_OUTPUT
          fi

      - name: Auto-Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Add Size Label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const additions = files.reduce((acc, file) => acc + file.additions, 0);
            const deletions = files.reduce((acc, file) => acc + file.deletions, 0);
            const changes = additions + deletions;
            
            let label = 'size/XS';
            if (changes > 500) label = 'size/XL';
            else if (changes > 250) label = 'size/L';
            else if (changes > 100) label = 'size/M';
            else if (changes > 30) label = 'size/S';
            
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

  # Job 2: Code Quality Check
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint with Auto-fix
        id: eslint
        run: |
          npm run lint:fix || echo "eslint_failed=true" >> $GITHUB_OUTPUT
          git diff --exit-code || echo "changes_made=true" >> $GITHUB_OUTPUT

      - name: Commit Auto-fixes
        if: steps.eslint.outputs.changes_made == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-fix linting issues'
          branch: ${{ github.head_ref }}

      - name: Run Code Complexity Analysis
        run: |
          npx complexity-report src/ --format json --output complexity-report.json
        continue-on-error: true

      - name: Check Code Duplication
        run: |
          npx jscpd src/ --min-lines 5 --min-tokens 50
        continue-on-error: true

  # Job 3: Dependency Review
  dependency-review:
    name: Dependency Security Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Check for Outdated Dependencies
        run: |
          npm outdated || true
          echo "Run 'npm update' to update dependencies"

  # Job 4: Build Preview
  build-preview:
    name: Build PR Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Build Preview
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Upload Preview Build
        uses: actions/upload-artifact@v3
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 7

      - name: Deploy Preview to Vercel
        id: deploy-preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist
          github-comment: true
          alias-domains: |
            pr-${{ github.event.pull_request.number }}.wildscape-europe.vercel.app

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy-preview.outputs.preview-url }}';
            const body = `## 🔍 Preview Deployment\n\n✅ Your PR has been deployed for preview!\n\n🔗 **Preview URL**: ${previewUrl}\n\n---\n_This preview will be updated on every push to this PR._`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Job 5: Visual Regression Testing
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Preview Build
        uses: actions/download-artifact@v3
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/

      - name: Run Percy Visual Tests
        uses: percy/snapshot-action@v0.1.3
        with:
          build-directory: dist
          flags: pr-preview
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        continue-on-error: true

  # Job 6: Accessibility Check
  accessibility-check:
    name: Accessibility (a11y) Check
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Preview Build
        uses: actions/download-artifact@v3
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Serve Build
        run: |
          npm install -g serve
          serve -s dist -p 4173 &
          sleep 5

      - name: Run Pa11y Accessibility Tests
        run: |
          npm install -g pa11y-ci
          pa11y-ci --sitemap http://localhost:4173/sitemap.xml || true

      - name: Run Axe Accessibility Tests
        uses: chanzuckerberg/axe-scan-action@v3
        with:
          url: http://localhost:4173
        continue-on-error: true

  # Job 7: Performance Budget Check
  performance-budget:
    name: Performance Budget
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Preview Build
        uses: actions/download-artifact@v3
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist/

      - name: Check Bundle Sizes
        run: |
          echo "Checking bundle sizes against budget..."
          
          # Define size budgets (in KB)
          MAX_JS_SIZE=500
          MAX_CSS_SIZE=50
          MAX_TOTAL_SIZE=1000
          
          JS_SIZE=$(find dist/assets -name "*.js" -exec du -k {} + | awk '{sum+=$1} END {print sum}')
          CSS_SIZE=$(find dist/assets -name "*.css" -exec du -k {} + | awk '{sum+=$1} END {print sum}')
          TOTAL_SIZE=$(du -sk dist | cut -f1)
          
          echo "JavaScript: ${JS_SIZE}KB (Budget: ${MAX_JS_SIZE}KB)"
          echo "CSS: ${CSS_SIZE}KB (Budget: ${MAX_CSS_SIZE}KB)"
          echo "Total: ${TOTAL_SIZE}KB (Budget: ${MAX_TOTAL_SIZE}KB)"
          
          BUDGET_EXCEEDED=false
          
          if [ "$JS_SIZE" -gt "$MAX_JS_SIZE" ]; then
            echo "❌ JavaScript bundle exceeds budget!"
            BUDGET_EXCEEDED=true
          fi
          
          if [ "$CSS_SIZE" -gt "$MAX_CSS_SIZE" ]; then
            echo "❌ CSS bundle exceeds budget!"
            BUDGET_EXCEEDED=true
          fi
          
          if [ "$TOTAL_SIZE" -gt "$MAX_TOTAL_SIZE" ]; then
            echo "❌ Total bundle size exceeds budget!"
            BUDGET_EXCEEDED=true
          fi
          
          if [ "$BUDGET_EXCEEDED" = true ]; then
            echo "performance_budget_exceeded=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ All bundles are within budget"

      - name: Comment Performance Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = `## ⚡ Performance Budget Check\n\n✅ Bundle sizes are within budget\n\nSee workflow logs for detailed breakdown.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        continue-on-error: true

  # Job 8: PR Summary
  pr-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [pr-validation, code-quality, dependency-review, build-preview]
    if: always()
    
    steps:
      - name: Generate PR Summary
        run: |
          echo "# 📋 PR Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ PR Validation: ${{ needs.pr-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Review: ${{ needs.dependency-review.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Preview: ${{ needs.build-preview.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks completed!" >> $GITHUB_STEP_SUMMARY

      - name: Check if All Passed
        run: |
          if [[ "${{ needs.pr-validation.result }}" != "success" ]] || \
             [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.build-preview.result }}" != "success" ]]; then
            echo "❌ Some PR checks failed"
            exit 1
          fi
          echo "✅ All PR checks passed!"

