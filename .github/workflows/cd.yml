name: CD - Deploy to Production

# Right-sized: deployment only runs on release tags (v*) or manual dispatch.
# It no longer runs on every push to main, because this repository does not
# provision the deployment secrets (Vercel / Netlify / AWS) required for a real
# deploy. Secret-dependent jobs are additionally guarded on secret presence so a
# manual run without configured secrets is skipped rather than failed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'

jobs:
  # Gate: detect whether deployment secrets are configured.
  check-secrets:
    name: Check Deployment Secrets
    runs-on: ubuntu-latest
    outputs:
      has-vercel: ${{ steps.check.outputs.has-vercel }}
    steps:
      - name: Check for Vercel secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "has-vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-vercel=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not configured - Vercel deploy will be skipped."
          fi

  # Job 1: Build for Production
  build-production:
    name: Build Production Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build for Production
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_GA_TRACKING_ID: ${{ secrets.VITE_GA_TRACKING_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Generate Build Metadata
        run: |
          echo "Build Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > dist/build-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> dist/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> dist/build-info.txt
          echo "Build Number: ${{ github.run_number }}" >> dist/build-info.txt

      - name: Optimize Assets
        run: |
          echo "Optimizing production build..."
          find dist -name "*.js" -exec gzip -k {} \;
          find dist -name "*.css" -exec gzip -k {} \;
          echo "Asset optimization complete"

      - name: Upload Production Build
        uses: actions/upload-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/
          retention-days: 30

  # Job 2: Deploy to Vercel
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [check-secrets, build-production]
    if: needs.check-secrets.outputs.has-vercel == 'true'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Production Build
        uses: actions/download-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist
          vercel-args: '--prod'
          github-comment: true

      - name: Verify Deployment
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.url }}"
          curl -f ${{ steps.deploy.outputs.url }} || exit 1
          echo "Deployment verified successfully"

  # Job 3: Deploy to Netlify (Alternative)
  deploy-netlify:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build-production
    if: false # Enable if using Netlify instead of Vercel

    environment:
      name: production-netlify
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Production Build
        uses: actions/download-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/

      - name: Deploy to Netlify
        id: deploy
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Verify Deployment
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.deploy-url }}"
          curl -f ${{ steps.deploy.outputs.deploy-url }} || exit 1

  # Job 4: Deploy to AWS S3 + CloudFront (Enterprise Option)
  deploy-aws:
    name: Deploy to AWS S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build-production
    if: false # Enable if using AWS

    environment:
      name: production-aws

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Production Build
        uses: actions/download-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt"

          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify Deployment
        run: |
          echo "Deployment URL: ${{ secrets.CLOUDFRONT_URL }}"
          curl -f ${{ secrets.CLOUDFRONT_URL }} || exit 1

  # Job 5: Deploy to GitHub Pages (Free Option)
  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Production Build
        uses: actions/download-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify Deployment
        run: |
          echo "GitHub Pages URL: ${{ steps.deployment.outputs.page_url }}"
          echo "Deployment to GitHub Pages complete"

  # Job 6: Post-Deployment Tests
  post-deploy-tests:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    if: needs.deploy-vercel.result == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Test Dependencies
        run: npm install -g lighthouse artillery

      - name: Run Smoke Tests
        run: |
          DEPLOY_URL="${{ needs.deploy-vercel.outputs.url }}"
          echo "Running smoke tests on: $DEPLOY_URL"

          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}\n" $DEPLOY_URL)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Site returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Site is accessible"

      - name: Check Critical Resources
        run: |
          echo "Verifying critical resources..."
          # Add your critical resource checks here

  # Job 7: Rollback (Manual)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Previous Successful Deployment
        id: previous
        run: |
          PREVIOUS_SHA=$(git log --format="%H" --skip=1 -n 1)
          echo "previous_sha=$PREVIOUS_SHA" >> $GITHUB_OUTPUT
          echo "Rolling back to: $PREVIOUS_SHA"

      - name: Trigger Rollback
        run: |
          echo "Rollback procedure initiated"
          echo "Previous SHA: ${{ steps.previous.outputs.previous_sha }}"
          # Add your rollback logic here

  # Job 8: Deployment Summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-vercel, post-deploy-tests]
    if: always()

    steps:
      - name: Generate Deployment Report
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Vercel deploy**: ${{ needs.deploy-vercel.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to Production
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
