name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
assignees:
  - Alexi5000

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the form below to help us understand your idea.

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the feature you'd like to see
      placeholder: I would like to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Have you considered any alternative solutions?
      placeholder: I've also thought about...

  - type: textarea
    id: benefits
    attributes:
      label: ✅ Benefits
      description: What are the benefits of this feature?
      placeholder: This would help because...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 📊 Priority
      description: How important is this feature to you?
      options:
        - Critical (blocks my workflow)
        - High (very important)
        - Medium (would be nice)
        - Low (nice to have)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 🏷️ Category
      description: What category does this feature fall under?
      options:
        - User Interface
        - User Experience
        - Performance
        - Accessibility
        - Map/Navigation
        - Search/Filters
        - Campsite Details
        - Weather Features
        - 3D Graphics
        - Mobile Experience
        - Documentation
        - API/Backend
        - Other
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups/Examples
      description: Add mockups, wireframes, or examples
      placeholder: Attach images or provide links to examples

  - type: textarea
    id: technical
    attributes:
      label: 🔧 Technical Considerations
      description: Any technical implementation details or constraints?
      placeholder: This might require...

  - type: dropdown
    id: breaking
    attributes:
      label: 💥 Breaking Change
      description: Would this be a breaking change?
      options:
        - "No"
        - "Yes"
        - "Maybe"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 📈 User Impact
      description: How many users would benefit from this?
      placeholder: This would help...

  - type: dropdown
    id: implementation
    attributes:
      label: 🛠️ Implementation Complexity
      description: How complex do you think this would be to implement?
      options:
        - Simple (< 1 day)
        - Medium (1-3 days)
        - Complex (1 week)
        - Very Complex (> 1 week)
        - I don't know

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context about the feature request
      placeholder: Any other relevant information

  - type: checkboxes
    id: contribution
    attributes:
      label: 🤝 Contribution
      description: Would you like to help implement this feature?
      options:
        - label: I'm willing to submit a PR for this feature
          required: false
        - label: I'm willing to help test this feature
          required: false
        - label: I can provide design mockups
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and PRs to ensure this is not a duplicate
          required: true
        - label: I have provided a clear description of the feature
          required: true
        - label: This feature aligns with the project's goals
          required: true

